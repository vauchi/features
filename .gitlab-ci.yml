# GitLab CI for vauchi-features
#
# Gherkin feature specifications - lint-only pipeline
#
# Uses shared templates from vauchi/scripts for consistency.

# Include shared templates
include:
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/lint-docs.yml'
      - '/ci-templates/mr-rules.yml'
      - '/ci-templates/reuse.yml'
      - '/ci-templates/image-lint.yml'
      - '/ci-templates/badges.yml'

stages:
  - lint
  - deploy

lint:images:
  extends: .image-lint

# Override shared template to exclude ideas/ directory from naming check.
# Idea files don't need date prefixes — they're informal brainstorming docs.
check-doc-naming:
  script:
    - |
      ERRORS=0

      for file in $(git diff --name-only origin/$CI_DEFAULT_BRANCH...HEAD -- '*.md' 2>/dev/null || find . -name "*.md" -type f); do
        filename=$(basename "$file")
        dirname=$(dirname "$file")

        # Skip exceptions
        case "$filename" in
          README.md|CLAUDE.md|CONTRIBUTING.md|roadmap.md|PRINCIPLES.md)
            continue
            ;;
        esac

        # Skip diagrams and ideas directories
        if echo "$dirname" | grep -qE "(diagrams|ideas)"; then
          continue
        fi

        # Skip root level files
        if [ "$dirname" = "." ]; then
          continue
        fi

        # Check for date prefix (YYYY-MM-DD-)
        if ! echo "$filename" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}-'; then
          echo "ERROR: $file does not follow YYYY-MM-DD-name.md convention"
          ERRORS=$((ERRORS + 1))
        fi
      done

      if [ $ERRORS -gt 0 ]; then
        echo ""
        echo "Found $ERRORS file(s) not following naming convention."
        echo "Files must be named: YYYY-MM-DD-description.md"
        exit 1
      fi

      echo "All documentation files follow naming convention."

# Validate Gherkin feature files
lint:gherkin:
  extends: .mr-or-main
  stage: lint
  image: node:20-alpine
  tags: [docker]
  before_script:
    - npm install -g @cucumber/gherkin-utils
  script:
    - |
      echo "Validating Gherkin feature files..."
      ERRORS=0

      for file in $(find . -name "*.feature" -not -path "./node_modules/*"); do
        echo "Checking: $file"

        # Parse the file to check for syntax errors
        gherkin-utils format "$file" > /dev/null 2>&1 || {
          echo "WARNING: Invalid Gherkin syntax in $file"
          ERRORS=$((ERRORS + 1))
        }
      done

      if [ $ERRORS -gt 0 ]; then
        echo "Found $ERRORS file(s) with Gherkin syntax errors."
        exit 1
      fi

      echo "Gherkin check complete"

# Check feature file structure
lint:structure:
  extends: .mr-or-main
  stage: lint
  image: alpine:3.21
  tags: [docker]
  script:
    - |
      echo "Checking feature file structure..."

      # Check that all .feature files have a Feature: line
      for file in $(find . -name "*.feature" -not -path "./node_modules/*"); do
        if ! grep -q "^Feature:" "$file"; then
          echo "ERROR: $file missing 'Feature:' declaration"
          exit 1
        fi
      done

      # Check for empty feature files
      for file in $(find . -name "*.feature" -not -path "./node_modules/*"); do
        if [ ! -s "$file" ]; then
          echo "ERROR: $file is empty"
          exit 1
        fi
      done

      echo "Structure checks passed!"

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages
