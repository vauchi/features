# GitLab CI for vauchi-features
#
# Gherkin feature specifications - lint-only pipeline
#
# Uses shared templates from vauchi/scripts for consistency.

workflow:
  auto_cancel:
    on_new_commit: interruptible
    on_job_failure: all
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "schedule"

default:
  interruptible: true

# Include shared templates
include:
  - project: 'vauchi/scripts'
    ref: ci-templates-v2026.07.1
    file:
      - '/ci-templates/lint-docs.yml'
      - '/ci-templates/mr-rules.yml'
      - '/ci-templates/reuse.yml'
      - '/ci-templates/image-lint.yml'
      - '/ci-templates/badges.yml'
      - '/ci-templates/github-mirror.yml'

variables:
  VAUCHI_SCRIPTS_REF: "ci-templates-v2026.07.1"

stages:
  - lint
  - deploy

lint:images:
  extends: .image-lint

# Override shared template to exclude ideas/ directory from naming check.
# Idea files don't need date prefixes — they're informal brainstorming docs.
check:doc-naming:
  tags: [docker]
  script:
    - |
      ERRORS=0

      for file in $(git diff --name-only origin/$CI_DEFAULT_BRANCH...HEAD -- '*.md' 2>/dev/null || find . -name "*.md" -type f); do
        filename=$(basename "$file")
        dirname=$(dirname "$file")

        # Skip exceptions
        case "$filename" in
          README.md|CLAUDE.md|CONTRIBUTING.md|roadmap.md|PRINCIPLES.md)
            continue
            ;;
        esac

        # Skip diagrams and ideas directories
        if echo "$dirname" | grep -qE "(diagrams|ideas)"; then
          continue
        fi

        # Skip root level files
        if [ "$dirname" = "." ]; then
          continue
        fi

        # Check for date prefix (YYYY-MM-DD-)
        if ! echo "$filename" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}-'; then
          echo "ERROR: $file does not follow YYYY-MM-DD-name.md convention"
          ERRORS=$((ERRORS + 1))
        fi
      done

      if [ $ERRORS -gt 0 ]; then
        echo ""
        echo "Found $ERRORS file(s) not following naming convention."
        echo "Files must be named: YYYY-MM-DD-description.md"
        exit 1
      fi

      echo "All documentation files follow naming convention."

# Combined cross-cutting feature-file lint checks.
lint:cross-cutting-blocking:
  extends: .mr-or-main
  stage: lint
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/node:20-alpine
  tags: [docker]
  needs: []
  allow_failure: false
  # Slow source fetch + a network `npm install -g` routinely blew the tight
  # default budget before the linter even ran (job timed out in setup, not on
  # content). Give the setup real headroom.
  timeout: 20m
  before_script:
    - npm install -g @cucumber/gherkin-utils
  script:
    # Validate Gherkin feature files
    - |
      echo "Validating Gherkin feature files..."
      ERRORS=0

      for file in $(find . -name "*.feature" -not -path "./node_modules/*"); do
        echo "Checking: $file"

        # Parse the file to check for syntax errors
        gherkin-utils format "$file" > /dev/null 2>&1 || {
          echo "WARNING: Invalid Gherkin syntax in $file"
          ERRORS=$((ERRORS + 1))
        }
      done

      if [ $ERRORS -gt 0 ]; then
        echo "Found $ERRORS file(s) with Gherkin syntax errors."
        exit 1
      fi

      echo "Gherkin check complete"

    # Report per-feature step-catalog coverage + gate against regression.
    # Steps outside the wired core vocabulary (STEP-CATALOG.md) are what make a
    # scenario skip against vauchi-core; this surfaces the reuse gap and fails if
    # a wired step is rewritten to free-form. Deterministic (catalog is in-repo).
    # Floor 333 -> 331 (features!100): two wired assertions were corrected
    # to real behavior that has no core step def yet — the avatar "too
    # large" rejection (ADR-042: core normalizes any format to WebP <=32KB,
    # never rejects) and the field-visibility default (now hidden, not
    # visible-to-all). Re-raise once those get wired core step definitions.
    - node scripts/check-step-catalog.mjs --min 331

    # Check feature file structure
    - |
      echo "Checking feature file structure..."

      # Check that all .feature files have a Feature: line
      for file in $(find . -name "*.feature" -not -path "./node_modules/*"); do
        if ! grep -q "^Feature:" "$file"; then
          echo "ERROR: $file missing 'Feature:' declaration"
          exit 1
        fi
      done

      # Check for empty feature files
      for file in $(find . -name "*.feature" -not -path "./node_modules/*"); do
        if [ ! -s "$file" ]; then
          echo "ERROR: $file is empty"
          exit 1
        fi
      done

      echo "Structure checks passed!"

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages

github-mirror:
  extends: .github-mirror
