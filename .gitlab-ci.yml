# GitLab CI for Gherkin Feature Specifications
#
# Validates feature file syntax and structure

stages:
  - lint

# Lint Gherkin feature files
lint:gherkin:
  stage: lint
  image: node:20-alpine
  before_script:
    - npm install -g @cucumber/gherkin-utils
  script:
    - |
      echo "Validating Gherkin feature files..."
      ERRORS=0
      for file in $(find . -name "*.feature" -not -path "./node_modules/*"); do
        echo "Checking: $file"
        # Parse the file to check for syntax errors
        gherkin-utils format "$file" > /dev/null 2>&1 || {
          echo "WARNING: Invalid Gherkin syntax in $file"
          ERRORS=$((ERRORS + 1))
        }
      done
      if [ $ERRORS -gt 0 ]; then
        echo "Found $ERRORS file(s) with warnings"
      fi
      echo "Gherkin check complete"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  allow_failure: true  # Advisory until all files are fixed

# Check for common issues
lint:structure:
  stage: lint
  image: alpine:latest
  script:
    - |
      echo "Checking feature file structure..."

      # Check that all .feature files have a Feature: line
      for file in $(find . -name "*.feature" -not -path "./node_modules/*"); do
        if ! grep -q "^Feature:" "$file"; then
          echo "ERROR: $file missing 'Feature:' declaration"
          exit 1
        fi
      done

      # Check for empty feature files
      for file in $(find . -name "*.feature" -not -path "./node_modules/*"); do
        if [ ! -s "$file" ]; then
          echo "ERROR: $file is empty"
          exit 1
        fi
      done

      echo "Structure checks passed!"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
